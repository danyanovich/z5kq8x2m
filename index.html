<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>System Config</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --border: #2b2b2b;
    --text: #e5e5ea;
    --text2: #8e8e93;
    --text3: #48484a;
    --accent: #0b93f6;
    --user-bg: #0b93f6;
    --bot-bg: #1c1c1e;
    --green: #34c759;
    --red: #ff453a;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── SLEEP SCREEN ── */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    padding: 24px;
    text-align: center;
  }
  .screen.active { display: flex; }
  .sleep-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 20px;
    transition: all 0.3s;
  }
  .sleep-title {
    font-size: 20px; font-weight: 600;
    margin-bottom: 8px;
  }
  .sleep-sub {
    font-size: 13px; color: var(--text2);
    margin-bottom: 28px;
  }
  .wake-btn {
    padding: 14px 36px;
    border-radius: 14px;
    background: var(--accent);
    color: white;
    font-size: 16px; font-weight: 500;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
  }
  .wake-btn:active { transform: scale(0.96); }

  /* ── LOGIN SCREEN ── */
  .login-box {
    width: 100%; max-width: 320px;
  }
  .login-title {
    font-size: 22px; font-weight: 700;
    margin-bottom: 24px;
  }
  .login-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 17px;
    font-family: inherit;
    outline: none;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .login-input:focus {
    border-color: var(--accent);
  }
  .login-input::placeholder {
    letter-spacing: 0;
    color: var(--text3);
    font-size: 14px;
  }
  .login-error {
    color: var(--red);
    font-size: 13px;
    margin-bottom: 12px;
    min-height: 20px;
  }
  .login-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    font-size: 16px; font-weight: 500;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
  }
  .login-btn:active { transform: scale(0.96); }
  .login-back {
    margin-top: 16px;
    background: none; border: none;
    color: var(--text2); font-size: 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .login-back:active { color: var(--text); }

  /* ── CHAT ── */
  #chat { display: none; }
  #chat.active { display: flex; flex-direction: column; height: 100dvh; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    height: 52px; padding: 0 12px;
    padding-top: env(safe-area-inset-top, 0px);
    background: #1a1a1a;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none;
    color: var(--text2); font-size: 20px; cursor: pointer;
    border-radius: 10px; -webkit-tap-highlight-color: transparent;
  }
  .header-btn:active { background: var(--surface2); }
  .header-center {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .logo {
    width: 24px; height: 24px; border-radius: 6px;
    background: linear-gradient(135deg, #8b5cf6, #d946ef);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .messages {
    flex: 1; overflow-y: auto;
    padding: 8px 12px;
    scroll-behavior: smooth;
  }
  .msg { display: flex; margin-bottom: 6px; }
  .msg.user { justify-content: flex-end; }
  .msg.bot { justify-content: flex-start; }
  .msg-bubble {
    max-width: 82%;
    padding: 8px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    word-wrap: break-word;
  }
  .msg.user .msg-bubble { background: var(--user-bg); color: white; border-bottom-right-radius: 5px; }
  .msg.bot .msg-bubble { background: var(--bot-bg); color: var(--text); border-bottom-left-radius: 5px; }
  .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.5; }
  .msg.user .msg-time { color: rgba(255,255,255,0.6); text-align: right; }
  .msg.bot .msg-time { color: var(--text3); }

  .quick-actions {
    display: flex; gap: 6px; padding: 6px 12px;
    overflow-x: auto; flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  .quick-btn {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); font-size: 12px;
    cursor: pointer; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .quick-btn:active { background: var(--surface2); color: var(--text); transform: scale(0.96); }

  .input-bar {
    display: flex; align-items: flex-end; gap: 8px;
    padding: 8px 12px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    background: #1a1a1a;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1; display: flex; align-items: center;
    background: var(--surface2); border-radius: 22px;
    padding: 0 14px; min-height: 40px;
  }
  .input-wrap input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 15px; line-height: 20px;
    padding: 10px 0; font-family: inherit;
  }
  .input-wrap input::placeholder { color: var(--text3); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  .send-btn:active { transform: scale(0.9); }
  .send-btn:disabled { background: var(--surface2); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .send-btn:disabled svg { fill: var(--text3); }
</style>
</head>
<body>

<!-- ═══ SLEEP SCREEN ═══ -->
<div class="screen active" id="sleepScreen">
  <div class="sleep-icon">💤</div>
  <div class="sleep-title">Hermes спит 😴</div>
  <div class="sleep-sub">Скажи «проснись» в Telegram, чтобы разбудить</div>
  <button class="wake-btn" id="wakeBtn">🔓 Разбудить</button>
  <p style="margin-top:16px; font-size:11px; color:var(--text3);">Потребуется пароль</p>
</div>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="screen" id="loginScreen">
  <div class="login-box">
    <div class="login-title">🔐</div>
    <input type="password" class="login-input" id="passInput" placeholder="Пароль" autocomplete="off">
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">Войти</button>
    <br>
    <button class="login-back" id="loginBack">← Назад</button>
  </div>
</div>

<!-- ═══ CHAT ═══ -->
<div id="chat">
  <div class="header">
    <button class="header-btn" id="lockBtn">🔒</button>
    <div class="header-center">
      <div class="logo">⚡</div>
      <span>Hermes Agent</span>
      <div class="status-dot"></div>
    </div>
    <button class="header-btn" id="clearBtn">✕</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="quick-actions" id="quickActions"></div>
  <div class="input-bar">
    <div class="input-wrap">
      <input id="chatInput" type="text" placeholder="Сообщение..." autocomplete="off">
    </div>
    <button class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const PASSWORD = 'admin123';
const CHAT_KEY = 'hermes_chat';
const STATE_KEY = 'hermes_state'; // 'sleep' | 'unlocked'

let tg = null;
try { if (window.Telegram?.WebApp) { tg = window.Telegram.WebApp; tg.ready(); tg.expand(); } } catch(e) {}

// ── Render ──
const sleepScreen = document.getElementById('sleepScreen');
const loginScreen = document.getElementById('loginScreen');
const chatEl = document.getElementById('chat');
const passInput = document.getElementById('passInput');
const loginError = document.getElementById('loginError');

function showScreen(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  chatEl.classList.remove('active');
  if (screen === 'sleep') sleepScreen.classList.add('active');
  else if (screen === 'login') loginScreen.classList.add('active');
  else if (screen === 'chat') chatEl.classList.add('active');
}

function goToSleep() {
  localStorage.setItem(STATE_KEY, 'sleep');
  showScreen('sleep');
  // Auto-lock the bot too
  if (tg) {
    tg.sendData('/sleep');
  }
}

function unlock() {
  localStorage.setItem(STATE_KEY, 'unlocked');
  showScreen('chat');
  initChat();
}

// Check saved state
(function initState() {
  const state = localStorage.getItem(STATE_KEY);
  if (state === 'unlocked') {
    unlock();
  } else {
    showScreen('sleep');
  }
})();

// ── Wake button ──
document.getElementById('wakeBtn').addEventListener('click', () => {
  showScreen('login');
  passInput.value = '';
  loginError.textContent = '';
  setTimeout(() => passInput.focus(), 300);
});

// ── Login ──
function doLogin() {
  if (passInput.value === PASSWORD) {
    unlock();
  } else {
    loginError.textContent = 'Неверный пароль';
    passInput.value = '';
    passInput.focus();
  }
}
document.getElementById('loginBtn').addEventListener('click', doLogin);
passInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginBack').addEventListener('click', () => showScreen('sleep'));

// ── Lock button in chat ──
document.getElementById('lockBtn').addEventListener('click', goToSleep);

// ── Chat logic ──
function loadMessages() {
  try { const d = localStorage.getItem(CHAT_KEY); return d ? JSON.parse(d) : []; } catch(e) { return []; }
}
function saveMessages(msgs) { localStorage.setItem(CHAT_KEY, JSON.stringify(msgs)); }
function now() { return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }); }

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const quickEl = document.getElementById('quickActions');

const QUICK_ACTIONS = [
  { label: 'Стратегия', icon: '📋', msg: 'расскажи стратегию на месяц' },
  { label: 'Отчёт', icon: '📊', msg: 'покажи статус всех бизнесов' },
  { label: 'Задачи', icon: '✅', msg: 'что я должен сделать сегодня?' },
  { label: 'Овощи', icon: '🥬', msg: 'овощная лавка' },
];

function renderMessages(msgs) {
  messagesEl.innerHTML = msgs.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-bubble">
        ${m.text.replace(/\n/g, '<br>')}
        <div class="msg-time">${m.time}</div>
      </div>
    </div>
  `).join('');
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderQuick() {
  quickEl.innerHTML = QUICK_ACTIONS.map(a => `
    <button class="quick-btn" data-msg="${a.msg}">${a.icon} ${a.label}</button>
  `).join('');
}

function addMessage(role, text) {
  const msgs = loadMessages();
  msgs.push({ role, text, time: now() });
  saveMessages(msgs);
  renderMessages(msgs);
}

function sendToBot(text) {
  if (tg) {
    tg.sendData(text);
    tg.close();
  } else {
    addMessage('user', text);
    addMessage('assistant', '⬆️ Сообщение отправлено!\n\nОткрой Telegram.');
  }
}

function initChat() {
  renderQuick();
  let msgs = loadMessages();
  if (msgs.length === 0) {
    msgs = [{ role: 'assistant', text: 'Привет, Дэн! 👋 Я проснулся. Чем займёмся?', time: now() }];
    saveMessages(msgs);
  }
  renderMessages(msgs);

  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim();
  });
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (text) {
        addMessage('user', text);
        sendToBot(text);
        inputEl.value = '';
        sendBtn.disabled = true;
      }
    }
  });
  sendBtn.addEventListener('click', () => {
    const text = inputEl.value.trim();
    if (text) {
      addMessage('user', text);
      sendToBot(text);
      inputEl.value = '';
      sendBtn.disabled = true;
    }
  });
  quickEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.quick-btn');
    if (btn) {
      const msg = btn.dataset.msg;
      addMessage('user', msg);
      sendToBot(msg);
    }
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    const msgs = [{ role: 'assistant', text: 'Чат очищен. 🙌', time: now() }];
    saveMessages(msgs);
    renderMessages(msgs);
  });
}
</script>
</body>
</html>
